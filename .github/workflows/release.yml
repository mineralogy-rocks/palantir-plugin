name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          if [ -z "$LATEST" ]; then
            NEW_VERSION="v0.1.0"
            echo "no prior semver tag; starting at $NEW_VERSION"
          else
            SEM="${LATEST#v}"
            if ! [[ "$SEM" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "error: latest tag '$LATEST' is not a valid semver vMAJOR.MINOR.PATCH" >&2
              exit 1
            fi
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "bumping $LATEST -> $NEW_VERSION"
          fi
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        run: |
          set -euo pipefail
          LATEST="${{ steps.bump.outputs.latest }}"
          if [ -n "$LATEST" ]; then
            NOTES=$(git log "$LATEST"..HEAD --pretty=format:'- %s' --no-merges)
          else
            NOTES=$(git log --pretty=format:'- %s' --no-merges -10)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="- (no new commits since $LATEST)"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "--- release notes preview ---"
          echo "$NOTES"

      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          NOTES="${{ steps.notes.outputs.notes }}"
          git tag "$NEW_VERSION"
          git push origin "$NEW_VERSION"
          gh release create "$NEW_VERSION" \
            --title "$NEW_VERSION" \
            --notes "$NOTES"
